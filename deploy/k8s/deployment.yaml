# WARNING: this legacy manifest mounts a PVC and enables tiered mode, but the
# current runtime does not yet guarantee SQL-visible restart durability. Hot
# partition WAL/recovery and HDB SQL merge remain release blockers. Use only for
# controlled evaluation; the Helm chart carries an explicit acknowledgement.
#
# Security prerequisites (create these before applying the workload objects):
#   kubectl create namespace zeptodb
#   kubectl -n zeptodb create secret generic zeptodb-auth \
#     --from-file=api-keys=/secure/path/api_keys.txt
#   openssl rand -base64 48 > /secure/path/cluster-secret
#   kubectl -n zeptodb create secret generic zeptodb-cluster \
#     --from-file=cluster-secret=/secure/path/cluster-secret
# The API-key file stores hashes, not raw credentials. Keep the corresponding
# raw administrator key in an external secrets manager.
apiVersion: v1
kind: Namespace
metadata:
  name: zeptodb
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zepto-config
  namespace: zeptodb
data:
  zeptodb.conf: |
    # ZeptoDB Cloud Configuration
    port: 8123
    worker_threads: 8
    analytics_mode: true
    cloud_native: true

    # Storage
    data_dir: /opt/zeptodb/data
    hdb_compression: lz4

    # Performance
    query_cache_size: 1000
    parallel_threshold: 100000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeptodb
  namespace: zeptodb
  labels:
    app: zeptodb
    version: "0.1.8"
spec:
  # This legacy manifest is standalone. Use the Helm cluster mode for multiple
  # replicas; independent standalone replicas would split client writes.
  replicas: 1
  selector:
    matchLabels:
      app: zeptodb
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # RWO-safe replacement: release the volume before scheduling the new pod.
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: zeptodb
        version: "0.1.8"
      # /metrics requires a metrics-role Bearer token. Configure credential-aware
      # Prometheus scraping externally; unauthenticated pod annotations are unsafe.
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        # Pod 분산 배치 (같은 노드에 여러 pod 방지)
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - zeptodb
              topologyKey: kubernetes.io/hostname
      containers:
      - name: zeptodb
        image: zeptodb/zeptodb:0.1.8
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        args:
        - --bind
        - 0.0.0.0
        - --allow-plaintext-http
        - --secure-cookie
        - --port
        - "8123"
        - --ticks
        - "0"
        - --storage-mode
        - tiered
        - --hdb-dir
        - /opt/zeptodb/data
        - --acknowledge-incomplete-durability
        - --api-keys-file
        - /run/secrets/zeptodb-auth/api_keys.txt
        - --no-bootstrap-dev-keys
        - --web-dir
        - /opt/zeptodb/web
        ports:
        - containerPort: 8123
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: "4"
            memory: "16Gi"
          limits:
            cpu: "8"
            memory: "32Gi"
        env:
        - name: APEX_WORKER_THREADS
          value: "8"
        - name: APEX_ANALYTICS_MODE
          value: "true"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: ZEPTO_CLUSTER_SECRET_FILE
          value: /run/secrets/zeptodb-cluster/cluster-secret
        volumeMounts:
        - name: config
          mountPath: /opt/zeptodb/config
          readOnly: true
        - name: data
          mountPath: /opt/zeptodb/data
        - name: auth
          mountPath: /run/secrets/zeptodb-auth
          readOnly: true
        - name: cluster-security
          mountPath: /run/secrets/zeptodb-cluster
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8123
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8123
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
      terminationGracePeriodSeconds: 30
      volumes:
      - name: config
        configMap:
          name: zepto-config
      - name: data
        persistentVolumeClaim:
          claimName: zeptodb-pvc
      - name: auth
        secret:
          secretName: zeptodb-auth
          defaultMode: 0444
          items:
          - key: api-keys
            path: api_keys.txt
      - name: cluster-security
        secret:
          secretName: zeptodb-cluster
          defaultMode: 0444
          items:
          - key: cluster-secret
            path: cluster-secret
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zeptodb-pvc
  namespace: zeptodb
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3  # AWS EBS gp3 (변경 가능: gce-pd-ssd, azure-disk-premium)
  resources:
    requests:
      storage: 500Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zeptodb-service
  namespace: zeptodb
  labels:
    app: zeptodb
spec:
  # Terminate TLS at an operator-managed ingress/load balancer before exposure.
  type: ClusterIP
  sessionAffinity: ClientIP  # 같은 클라이언트 → 같은 pod
  selector:
    app: zeptodb
  ports:
  - port: 8123
    targetPort: 8123
    protocol: TCP
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: zeptodb-headless
  namespace: zeptodb
spec:
  clusterIP: None
  selector:
    app: zeptodb
  ports:
  - port: 8123
    targetPort: 8123
    name: http
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zeptodb
  namespace: zeptodb
spec:
  podSelector:
    matchLabels:
      app: zeptodb
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8123
          protocol: TCP
      # Add an explicit namespaceSelector + podSelector for any approved TLS
      # ingress controller or external-namespace monitoring workload.
      from:
        - podSelector: {}
