# k8s/eks-bench-cluster.yaml — EKS Auto Mode cluster for multi-node benchmark
# Usage: eksctl create cluster -f k8s/eks-bench-cluster.yaml
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: zepto-bench
  region: ap-northeast-2
  version: "1.35"

autoModeConfig:
  enabled: true
  # Uses default node pools (general-purpose + system)
  # Custom NodePools for realtime/analytics applied via kubectl after creation
