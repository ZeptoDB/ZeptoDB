apiVersion: v1
kind: ServiceAccount
metadata:
  name: zeptodb-operator
  namespace: zeptodb-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zeptodb-operator
rules:
  # ZeptoDBCluster CRDs
  - apiGroups: [zeptodb.com]
    resources: [zeptodbclusters, zeptodbclusters/status]
    verbs: [get, list, watch, patch, update]
  # Workloads managed by Helm
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch, create, update, patch, delete]
  # Core resources managed by Helm
  - apiGroups: [""]
    resources: [services, configmaps, persistentvolumeclaims, pods]
    verbs: [get, list, watch, create, update, patch, delete]
  # License secrets (read-only)
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zeptodb-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: zeptodb-operator
subjects:
  - kind: ServiceAccount
    name: zeptodb-operator
    namespace: zeptodb-system
