apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: zeptodbclusters.zeptodb.com
spec:
  group: zeptodb.com
  names:
    kind: ZeptoDBCluster
    listKind: ZeptoDBClusterList
    plural: zeptodbclusters
    singular: zeptodbcluster
    shortNames: [zdb]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [replicas, version]
              properties:
                replicas:
                  type: integer
                  minimum: 1
                  default: 1
                version:
                  type: string
                storage:
                  type: string
                  default: "500Gi"
                license:
                  type: object
                  properties:
                    secretName:
                      type: string
                    secretKey:
                      type: string
                      default: "license-key"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Failed]
                readyReplicas:
                  type: integer
                edition:
                  type: string
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Edition
          type: string
          jsonPath: .status.edition
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
