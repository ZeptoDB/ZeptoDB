# Standalone mode is a single database process. Running multiple standalone
# replicas behind one Service would split writes across independent stores.
# Set cluster.enabled=true and choose an explicit replica count for scale-out.
replicaCount: 1

image:
  repository: zeptodb/zeptodb
  tag: "0.1.8"
  # Set to the published `sha256:...` value at release time to override tag
  # selection with an immutable image reference.
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  # ClusterIP is deliberate: terminate TLS and enforce network policy at an
  # operator-managed ingress/load balancer before exposing the HTTP endpoint.
  type: ClusterIP
  port: 8123
  sessionAffinity: ClientIP

networkPolicy:
  # Requires a CNI that enforces Kubernetes NetworkPolicy. This default limits
  # ingress to the release namespace; add narrowly scoped peers for a TLS
  # ingress controller or a Prometheus instance in another namespace.
  enabled: true
  http:
    allowSameNamespace: true
    # Each entry is a Kubernetes NetworkPolicyPeer. Example:
    # - namespaceSelector:
    #     matchLabels:
    #       kubernetes.io/metadata.name: ingress-nginx
    #   podSelector:
    #     matchLabels:
    #       app.kubernetes.io/name: ingress-nginx
    additionalSources: []

# HTTP authentication is fail-closed by default. When existingSecret is empty,
# Helm creates and retains a bootstrap admin credential across upgrades. An
# existing Secret must contain all three keys named below. Only apiKeysKey is
# mounted into the database pod. The operator retrieves adminKeyKey explicitly;
# the ServiceMonitor reads metricsKeyKey as a metrics-role Bearer credential.
auth:
  enabled: true
  existingSecret: ""
  apiKeysKey: api-keys
  adminKeyKey: admin-api-key
  metricsKeyKey: metrics-api-key
  mountPath: /run/secrets/zeptodb-auth/api_keys.txt
  # Change this opaque value after rotating an externally managed Secret to
  # force a workload restart. The process loads the key store only at startup.
  rolloutChecksum: ""

# Optional command/argument overrides for custom images. Empty values use the
# chart's production ZeptoDB arguments.
container:
  command: []
  args: []

validation:
  # Test harnesses that substitute a non-ZeptoDB image may opt out. Never set
  # this for a real ZeptoDB standalone deployment.
  allowUnsafeStandaloneScale: false

# The production images use the distroless nonroot UID. fsGroup makes newly
# provisioned PVCs writable without a privileged chmod init container.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

# ZeptoDB does not require Linux capabilities or a Kubernetes API token for the
# current static topology. Future API-based discovery must opt in explicitly.
automountServiceAccountToken: false
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

headless:
  enabled: true

resources:
  # Defaults sized for mid-size factory / trading workloads (~200K–500K ticks/s).
  # Right-size per sector — see docs/operations/KUBERNETES_OPERATIONS.md
  # "Sizing and placement for enterprise factory workloads" section.
  # For bare-metal trading (Guaranteed QoS + cpuset pinning), use a reviewed
  # overlay with requests.cpu == limits.cpu. HugePages are intentionally absent
  # from the portable defaults because nodes must reserve them before pods run.
  requests:
    cpu: "2000m"          # 2 cores — covers N drain threads + HTTP/RPC
    memory: "4Gi"         # 4 GiB — 32 MB arena × hundreds of partitions + ring buffers
  limits:
    cpu: "4000m"          # allow burst to 4 cores under ingest spike
    memory: "8Gi"

config:
  port: 8123
  workerThreads: 8
  analyticsMode: true
  cloudNative: true
  dataDir: /opt/zeptodb/data
  hdbCompression: lz4
  queryCacheSize: 1000
  parallelThreshold: 100000

# ---------------------------------------------------------------------------
# Pipeline ingest tuning (devlog 102 — Phase 1 scale-out)
# ---------------------------------------------------------------------------
# Both values use 0 = "engine default":
#   drainThreads        0 → auto: max(2, hw_concurrency / 4)
#                       N>0 → exactly N drain threads (honored verbatim)
#   ringBufferCapacity  0 → 65536 (backward-compat default)
#                       N → power of two in [4096, 16777216]
# Raise these when ingest_tick() queue-full warnings appear or when the
# synchronous store_tick() fallback (~34× throughput cliff) is observed
# under burst load. Tuning guide: docs/operations/KUBERNETES_OPERATIONS.md §5.
pipeline:
  drainThreads: 0
  ringBufferCapacity: 0

cluster:
  enabled: false
  rpcPortOffset: 100       # rpc_port = service.port + offset
  heartbeatPort: 9100
  security:
    # Mutual shared-secret authentication protects cluster peer identity but
    # does not encrypt RPC payloads. Keep RPC on a private network.
    enabled: true
    existingSecret: ""
    secretKey: cluster-secret
    mountPath: /run/secrets/zeptodb-cluster/cluster-secret
    # Change only as part of a coordinated cluster-secret rotation. Mixed old
    # and new processes cannot authenticate each other during a rolling restart.
    rolloutChecksum: ""

persistence:
  # Portable defaults are deliberately in-memory. A PVC and tiered HDB path do
  # not yet provide complete SQL-visible restart durability: hot-partition WAL
  # coverage/recovery and HDB-row merging into general SQL reads remain open.
  enabled: false
  # Required to mount a PVC for durability evaluation before those promotion
  # blockers close. This is not a production-readiness assertion.
  acknowledgeIncompleteDurability: false
  storageClass: gp3
  size: 500Gi
  accessMode: ReadWriteOnce

probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /ready
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 2

gracefulShutdown:
  # The distroless production image has no /bin/sh. Leave empty to rely on
  # SIGTERM handling; custom images may supply an explicit preStop command.
  preStopCommand: []
  preStopSleepSeconds: 15
  terminationGracePeriodSeconds: 30

autoscaling:
  # Disabled until StatefulSet peer discovery dynamically tracks new ordinals.
  # Static startup peer lists make HPA-created cluster members incomplete.
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPU: 70
  targetMemory: 80
  scaleDown:
    stabilizationSeconds: 300
  scaleUp:
    stabilizationSeconds: 60
  # Custom-metric autoscaling on real ingest load (P8-I4, devlog 117).
  # Requires prometheus-adapter installed and configured to expose
  # `zepto_ingest_ticks_per_sec` as a Pods metric. CPU/memory above act
  # as a safety net for non-ingest workloads.
  targetIngestRate: 50000  # ticks/sec per pod; scale up when avg exceeds this
  ingestRateEnabled: false  # opt-in until prometheus-adapter is part of the chart

podAntiAffinity:
  enabled: true
  required: true           # true = hard rule (no co-location); false = soft preference
  weight: 100              # only used when required=false

# ---------------------------------------------------------------------------
# Topology spread — smarter than antiAffinity when replicas > nodes
# ---------------------------------------------------------------------------
# `podAntiAffinity.required: true` refuses to schedule extras beyond node
# count. `topologySpread` spreads pods as evenly as possible across the
# chosen topology, and still allows more replicas than nodes if needed.
# Kubernetes applies both constraints simultaneously.
topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: DoNotSchedule   # or ScheduleAnyway for soft

podDisruptionBudget:
  enabled: true
  minAvailable: 1

updateStrategy:
  # RWO volumes cannot be attached to an old and replacement pod on different
  # nodes at the same time. Stop the old standalone pod before replacement.
  maxSurge: 0
  maxUnavailable: 1

prometheus:
  # Pod annotations cannot attach the required Bearer credential. Use the
  # credential-aware ServiceMonitor below, or an equivalent external config.
  scrape: false
  port: 8123
  path: /metrics

serviceMonitor:
  enabled: false
  interval: 15s
  authorization:
    # Required with auth.enabled=true. The generated metrics-only credential is
    # referenced from the auth Secret without mounting the raw token in the pod.
    enabled: true

nodeSelector: {}
tolerations: []
extraEnv: []

# ---------------------------------------------------------------------------
# Performance tuning for latency-sensitive workloads
# ---------------------------------------------------------------------------
# These settings eliminate the main container performance bottlenecks:
#   1. Guaranteed QoS (requests == limits) → cpuset pinning, no throttling
#   2. Hugepages → arena allocator performance
#   3. hostNetwork → bypass CNI overhead for cluster RPC
#   4. Topology Manager (kubelet) → single-NUMA-node scheduling
#
# kubelet flags required on nodes (via launch template or EKS config):
#   --cpu-manager-policy=static
#   --topology-manager-policy=single-numa-node
#   --memory-manager-policy=Static
#   --reserved-memory='[{"numaNode":0,"limits":{"memory":"1Gi"}}]'
# ---------------------------------------------------------------------------
performanceTuning:
  hostNetwork: false       # true → bypass CNI for cluster RPC (requires dnsPolicy override)
  hugepages:
    # Opt in only on nodes with an audited pre-reserved HugePages pool and add
    # matching hugepages-2Mi requests/limits in the same values overlay.
    enabled: false
    size: "2Mi"

# ---------------------------------------------------------------------------
# Karpenter (Fleet API) — replaces Cluster Autoscaler
# ---------------------------------------------------------------------------
# Karpenter calls EC2 Fleet API directly (CreateFleet) instead of going
# through ASG. This means:
#   - price-capacity-optimized: Fleet picks Spot pools with lowest
#     interruption rate AND lowest price automatically
#   - Multi-pool request: wide instance family/size = more capacity pools
#     = lower Spot interruption probability
#   - Instant mode: no launch template, no ASG — node ready in 30-60s
#
# Enable with: --set karpenter.enabled=true
# Requires: Karpenter v1.0+ installed on the cluster
# ---------------------------------------------------------------------------
karpenter:
  enabled: false

  nodeClass:
    role: "KarpenterNodeRole"          # IAM instance profile for EC2 nodes
    clusterName: "zeptodb-cluster"     # EKS cluster name (subnet/SG discovery)
    amiAlias: "al2023@latest"          # Amazon Linux 2023
    tags: {}                           # Additional EC2 tags

  # =========================================================================
  # Realtime pool: ingestion + low-latency queries
  # Fleet API: On-Demand only → lowest-price allocation
  #
  # Performance tuning:
  #   - i4i: NVMe instance store (~4 GB/s) for HDB flush
  #   - c7g: Graviton3 compute-optimized for ingestion
  #   - userData: kernel tuning applied on node boot
  #   - Single AZ: consistent network latency
  # =========================================================================
  realtime:
    weight: 10                         # lower = higher priority
    arch: ["arm64"]                    # Graviton (best price-performance)
    instanceFamilies: ["i4g", "c7g"]   # i4g: instance store NVMe, c7g: compute
    instanceSizes: ["xlarge", "2xlarge", "4xlarge"]
    zones: []                          # set ["ap-northeast-2a"] for single-AZ latency
    volumeSize: "100Gi"
    instanceStorePolicy: "RAID0"       # use NVMe instance store for HDB flush
    limits:
      cpu: "64"
      memory: "128Gi"
    consolidateAfter: "30m"            # conservative — avoid churn during trading hours
    budgets:                           # disruption budget — max 1 node at a time
      - nodes: "1"
    userData: |
      #!/bin/bash
      # --- ZeptoDB bare-metal tuning (applied on node boot) ---
      # Hugepages: 16GB (8192 x 2MB)
      echo 8192 > /proc/sys/vm/nr_hugepages
      # CPU governor: consistent clock speed
      for g in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
        [ -f "$g" ] && echo performance > "$g"
      done
      # Disable NUMA auto-balancing (ZeptoDB manages NUMA explicitly)
      echo 0 > /proc/sys/kernel/numa_balancing
      # Memory: no swap, no THP
      sysctl -w vm.swappiness=0
      [ -f /sys/kernel/mm/transparent_hugepage/enabled ] && echo never > /sys/kernel/mm/transparent_hugepage/enabled
      # Network: low-latency tuning
      sysctl -w net.core.busy_poll=50
      sysctl -w net.core.busy_read=50
      sysctl -w net.ipv4.tcp_low_latency=1
      sysctl -w net.core.rmem_max=134217728
      sysctl -w net.core.wmem_max=134217728

  # =========================================================================
  # Analytics pool: backtesting + batch queries
  # Fleet API: price-capacity-optimized → Spot with lowest interruption
  #
  # Wide instance selection = more Fleet capacity pools:
  #   6 families × 3 sizes × 3 AZs = 54 pools
  #   → Spot interruption rate drops significantly
  # =========================================================================
  analytics:
    weight: 50                         # lower priority than realtime
    arch: ["arm64"]
    capacityTypes: ["spot", "on-demand"]  # Spot preferred, OD fallback
    instanceFamilies: ["r7g", "r6g", "m7g", "m6g", "c7g", "c6g"]  # wide selection
    instanceSizes: ["xlarge", "2xlarge", "4xlarge"]
    zones: []                          # multi-AZ for Spot diversity
    minCpu: ""                         # e.g. "4" — minimum vCPU per instance
    minMemory: ""                      # e.g. "16384" (MiB) — minimum memory
    volumeSize: "200Gi"
    instanceStorePolicy: ""            # "RAID0" to use NVMe instance store as scratch
    limits:
      cpu: "128"
      memory: "512Gi"
    consolidateAfter: "5m"             # aggressive — reclaim idle analytics nodes fast
    expireAfter: "24h"                 # recycle nodes daily (fresh AMI, no drift)
    budgets:
      - nodes: "20%"                   # allow 20% disruption for consolidation

# ---------------------------------------------------------------------------
# Cold tier: stream sealed/aged partitions to S3 as Parquet (devlog 118).
# Required when `coldTier.enabled=true`: an S3 bucket the pod can write to
# (IRSA / instance role / explicit creds). External tools (Athena, DuckDB,
# Spark, Polars) auto-discover Hive-partitioned data — default to `hive`.
# ---------------------------------------------------------------------------
coldTier:
  enabled: false
  format: parquet            # parquet | both (binary+parquet)
  layout: hive               # hive | flat
  deleteLocalAfterS3: true   # delete local Parquet after successful upload
  ageHours: 24               # promote partitions older than N hours to cold
  s3:
    bucket: ""
    region: "us-east-1"
    prefix: "hdb"
    endpointUrl: ""          # MinIO / non-AWS endpoints
    usePathStyle: false      # MinIO: true

# ---------------------------------------------------------------------------
# Stateless ingest tier (P8-I3, devlog 113) — opt-in
# ---------------------------------------------------------------------------
# Deploys N pods running `zepto_ingest_node`. Each pod receives HTTP INSERT
# and forwards every tick to the correct storage pod via the
# CoordinatorRoutingAdapter (devlog 111). Owns zero data.
#
# The current binary cannot authenticate clients, so this workload is blocked
# from production rendering. An isolated benchmark must opt into noAuth and
# provide storage routes explicitly:
# Storage node discovery is not yet automatic — pass storage peers explicitly
# via extraArgs until the discovery init container lands (see
# docs/devlog/113_stateless_ingest_node.md):
#
#   --set ingest.enabled=true \
#   --set ingest.noAuth=true \
#   --set-string 'ingest.extraArgs={--add-node,0:zeptodb-0.zeptodb-headless:8123,--add-node,1:zeptodb-1.zeptodb-headless:8123}'
# ---------------------------------------------------------------------------
ingest:
  enabled: false
  replicas: 2
  # zepto_ingest_node does not yet load the shared API-key store. false is the
  # fail-closed default; true is an explicit isolated benchmark/dev override.
  noAuth: false
  extraArgs: []
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: "1000m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
