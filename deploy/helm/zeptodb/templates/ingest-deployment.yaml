{{- /*
  Stateless ingest tier (P8-I3, devlog 113).

  Opt-in via `ingest.enabled=true`. Deploys N ingest-only pods that run the
  `zepto_ingest_node` binary. Each pod:
    * accepts HTTP INSERT on .Values.config.port
    * holds zero data locally (self node_id=99999 never owns a partition)
    * forwards every tick to the correct storage pod via
      CoordinatorRoutingAdapter (devlog 111) over TCP RPC

  STORAGE NODE DISCOVERY (minimal scaffold):
  ------------------------------------------
  `zepto_ingest_node` needs `--add-node id:host:port` for every storage pod.
  This template leaves that wiring as a TODO. Production deployments should
  add an init container that discovers the StatefulSet pods via the headless
  service (e.g. `zeptodb-headless.{namespace}.svc.cluster.local`) and writes
  the resulting `--add-node` flags into a shared volume that this container
  sources at startup. See docs/devlog/113_stateless_ingest_node.md.

  Until that init container lands, override args explicitly:
    helm install ... \
      --set ingest.enabled=true \
      --set ingest.noAuth=true \
      --set-string 'ingest.extraArgs={--add-node,0:zeptodb-0.zeptodb-headless:8123,--add-node,1:zeptodb-1.zeptodb-headless:8123}'
*/ -}}
{{- if .Values.ingest.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zeptodb.fullname" . }}-ingest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zeptodb.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
spec:
  replicas: {{ .Values.ingest.replicas }}
  selector:
    matchLabels:
      {{- include "zeptodb.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        {{- include "zeptodb.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ingest
      annotations:
        checksum/security: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        checksum/security-values: {{ toJson (dict "auth" .Values.auth "clusterSecurity" .Values.cluster.security) | sha256sum }}
        checksum/cluster-external: {{ .Values.cluster.security.rolloutChecksum | quote }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ingest
          image: {{ include "zeptodb.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["./zepto_ingest_node"]
          args:
            - "--port"
            - "{{ .Values.config.port }}"
            {{- if .Values.ingest.noAuth }}
            - "--no-auth"
            {{- end }}
            {{- if not .Values.cluster.security.enabled }}
            - "--allow-insecure-cluster"
            {{- end }}
            {{- with .Values.ingest.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
          {{- if .Values.cluster.security.enabled }}
          env:
            - name: ZEPTO_CLUSTER_SECRET_FILE
              value: {{ .Values.cluster.security.mountPath | quote }}
          volumeMounts:
            - name: cluster-security
              mountPath: {{ dir .Values.cluster.security.mountPath | quote }}
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ingest.resources | nindent 12 }}
      {{- if .Values.cluster.security.enabled }}
      volumes:
        - name: cluster-security
          secret:
            secretName: {{ include "zeptodb.clusterSecretName" . }}
            defaultMode: 0444
            items:
              - key: {{ .Values.cluster.security.secretKey }}
                path: {{ base .Values.cluster.security.mountPath }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zeptodb.fullname" . }}-ingest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zeptodb.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
spec:
  type: {{ .Values.ingest.service.type }}
  ports:
    - name: http
      port: {{ .Values.config.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "zeptodb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
{{- end }}
