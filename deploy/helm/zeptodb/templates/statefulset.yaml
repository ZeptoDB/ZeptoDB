{{- if .Values.cluster.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "zeptodb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zeptodb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "zeptodb.fullname" . }}-headless
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "zeptodb.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "zeptodb.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.image.tag | default .Chart.AppVersion | quote }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.prometheus.scrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.prometheus.port | quote }}
        prometheus.io/path: {{ .Values.prometheus.path | quote }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.gracefulShutdown.terminationGracePeriodSeconds }}
      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.podAntiAffinity.weight }}
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "zeptodb.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: gen-cluster-args
          image: busybox:1.36-musl
          command: ["sh", "-c"]
          args:
            - |
              # Copy statically-linked busybox for main container (distroless has no shell)
              cp /bin/busybox /shared/sh
              chmod +x /shared/sh

              FULLNAME="{{ include "zeptodb.fullname" . }}"
              HEADLESS="${FULLNAME}-headless.{{ .Release.Namespace }}.svc.cluster.local"
              REPLICAS={{ .Values.replicaCount }}
              PORT={{ .Values.config.port }}
              ORDINAL=${HOSTNAME##*-}

              # Build startup script
              cat > /shared/start.sh <<SCRIPT
              #!/shared/sh
              exec ./zepto_http_server --port ${PORT} --node-id ${ORDINAL} --no-auth --web-dir /opt/zeptodb/web$(for i in $(seq 0 $((REPLICAS - 1))); do [ "$i" != "$ORDINAL" ] && echo -n " --add-node ${i}:${FULLNAME}-${i}.${HEADLESS}:${PORT}"; done)
              SCRIPT
              chmod +x /shared/start.sh
              echo "Generated: $(cat /shared/start.sh)"
          volumeMounts:
            - name: shared
              mountPath: /shared
      containers:
        - name: zeptodb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/shared/sh", "/shared/start.sh"]
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
            - name: rpc
              containerPort: {{ add .Values.config.port .Values.cluster.rpcPortOffset }}
              protocol: TCP
            - name: heartbeat
              containerPort: {{ .Values.cluster.heartbeatPort }}
              protocol: UDP
          env:
            - name: ZEPTO_WORKER_THREADS
              value: {{ .Values.config.workerThreads | quote }}
            - name: ZEPTO_ANALYTICS_MODE
              value: {{ .Values.config.analyticsMode | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: config
              mountPath: /opt/zeptodb/config
              readOnly: true
            - name: shared
              mountPath: /shared
              readOnly: true
            {{- if .Values.performanceTuning.hugepages.enabled }}
            - name: hugepage
              mountPath: /dev/hugepages
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.gracefulShutdown.preStopSleepSeconds }}"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "zeptodb.fullname" . }}
        - name: shared
          emptyDir: {}
        {{- if .Values.performanceTuning.hugepages.enabled }}
        - name: hugepage
          emptyDir:
            medium: HugePages-{{ .Values.performanceTuning.hugepages.size }}
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: {{ .Values.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
{{- end }}
