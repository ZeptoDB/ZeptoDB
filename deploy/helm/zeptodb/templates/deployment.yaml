{{- if not .Values.cluster.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zeptodb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zeptodb.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "zeptodb.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.updateStrategy.maxSurge }}
      maxUnavailable: {{ .Values.updateStrategy.maxUnavailable }}
  template:
    metadata:
      labels:
        {{- include "zeptodb.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.image.tag | default .Chart.AppVersion | quote }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/security: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        checksum/security-values: {{ toJson (dict "auth" .Values.auth "clusterSecurity" .Values.cluster.security) | sha256sum }}
        checksum/auth-external: {{ .Values.auth.rolloutChecksum | quote }}
        checksum/cluster-external: {{ .Values.cluster.security.rolloutChecksum | quote }}
        {{- if .Values.prometheus.scrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.prometheus.port | quote }}
        prometheus.io/path: {{ .Values.prometheus.path | quote }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.gracefulShutdown.terminationGracePeriodSeconds }}
      {{- if .Values.performanceTuning.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          {{- if .Values.podAntiAffinity.required }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "zeptodb.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.podAntiAffinity.weight }}
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "zeptodb.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
          {{- end }}
      {{- end }}
      {{- if .Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpread.maxSkew }}
          topologyKey: {{ .Values.topologySpread.topologyKey | quote }}
          whenUnsatisfiable: {{ .Values.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "zeptodb.selectorLabels" . | nindent 14 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: zeptodb
          image: {{ include "zeptodb.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.container.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.container.args }}
          args:
            {{- toYaml .Values.container.args | nindent 12 }}
          {{- else }}
          args:
            - "--bind"
            - "0.0.0.0"
            - "--allow-plaintext-http"
            - "--secure-cookie"
            - "--port"
            - {{ .Values.config.port | quote }}
            - "--ticks"
            - "0"
            {{- if .Values.persistence.enabled }}
            - "--storage-mode"
            - "tiered"
            - "--hdb-dir"
            - {{ .Values.config.dataDir | quote }}
            - "--acknowledge-incomplete-durability"
            {{- end }}
            {{- if .Values.auth.enabled }}
            - "--api-keys-file"
            - {{ .Values.auth.mountPath | quote }}
            - "--no-bootstrap-dev-keys"
            {{- else }}
            - "--no-auth"
            {{- end }}
            - "--web-dir"
            - "/opt/zeptodb/web"
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
            {{- if .Values.cluster.enabled }}
            - name: rpc
              containerPort: {{ add .Values.config.port .Values.cluster.rpcPortOffset }}
              protocol: TCP
            - name: heartbeat
              containerPort: {{ .Values.cluster.heartbeatPort }}
              protocol: UDP
            {{- end }}
          env:
            - name: ZEPTO_WORKER_THREADS
              value: {{ .Values.config.workerThreads | quote }}
            - name: ZEPTO_ANALYTICS_MODE
              value: {{ .Values.config.analyticsMode | quote }}
            - name: ZEPTO_DRAIN_THREADS
              value: {{ .Values.pipeline.drainThreads | default 0 | quote }}
            - name: ZEPTO_RING_BUFFER_CAPACITY
              value: {{ .Values.pipeline.ringBufferCapacity | default 0 | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- if .Values.cluster.security.enabled }}
            - name: ZEPTO_CLUSTER_SECRET_FILE
              value: {{ .Values.cluster.security.mountPath | quote }}
            {{- end }}
            {{- if .Values.coldTier.enabled }}
            # --- devlog 118: cold-tier S3 Parquet sink ---
            - name: ZEPTO_COLD_TIER_ENABLED
              value: "true"
            - name: ZEPTO_COLD_TIER_FORMAT
              value: {{ .Values.coldTier.format | default "parquet" | quote }}
            - name: ZEPTO_COLD_TIER_LAYOUT
              value: {{ .Values.coldTier.layout | default "hive" | quote }}
            - name: ZEPTO_COLD_TIER_AGE_HOURS
              value: {{ .Values.coldTier.ageHours | default 24 | quote }}
            - name: ZEPTO_COLD_TIER_DELETE_LOCAL_AFTER_S3
              value: {{ .Values.coldTier.deleteLocalAfterS3 | default true | quote }}
            - name: ZEPTO_COLD_TIER_S3_BUCKET
              value: {{ .Values.coldTier.s3.bucket | quote }}
            - name: ZEPTO_COLD_TIER_S3_REGION
              value: {{ .Values.coldTier.s3.region | default "us-east-1" | quote }}
            - name: ZEPTO_COLD_TIER_S3_PREFIX
              value: {{ .Values.coldTier.s3.prefix | default "hdb" | quote }}
            - name: ZEPTO_COLD_TIER_S3_ENDPOINT_URL
              value: {{ .Values.coldTier.s3.endpointUrl | default "" | quote }}
            - name: ZEPTO_COLD_TIER_S3_USE_PATH_STYLE
              value: {{ .Values.coldTier.s3.usePathStyle | default false | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /opt/zeptodb/config
              readOnly: true
            {{- if .Values.auth.enabled }}
            - name: auth
              mountPath: {{ dir .Values.auth.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.cluster.security.enabled }}
            - name: cluster-security
              mountPath: {{ dir .Values.cluster.security.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            {{- end }}
            {{- if .Values.performanceTuning.hugepages.enabled }}
            - name: hugepage
              mountPath: /dev/hugepages
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- with .Values.gracefulShutdown.preStopCommand }}
          lifecycle:
            preStop:
              exec:
                command:
                  {{- toYaml . | nindent 18 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "zeptodb.fullname" . }}
        {{- if .Values.auth.enabled }}
        - name: auth
          secret:
            secretName: {{ include "zeptodb.authSecretName" . }}
            defaultMode: 0444
            items:
              - key: {{ .Values.auth.apiKeysKey }}
                path: {{ base .Values.auth.mountPath }}
        {{- end }}
        {{- if .Values.cluster.security.enabled }}
        - name: cluster-security
          secret:
            secretName: {{ include "zeptodb.clusterSecretName" . }}
            defaultMode: 0444
            items:
              - key: {{ .Values.cluster.security.secretKey }}
                path: {{ base .Values.cluster.security.mountPath }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "zeptodb.fullname" . }}-data
        {{- end }}
        {{- if .Values.performanceTuning.hugepages.enabled }}
        - name: hugepage
          emptyDir:
            medium: HugePages-{{ .Values.performanceTuning.hugepages.size }}
        {{- end }}
{{- end }}
