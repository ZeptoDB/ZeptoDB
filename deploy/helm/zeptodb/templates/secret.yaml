{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
{{- $secretName := include "zeptodb.authSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $adminKey := "" }}
{{- $metricsKey := "" }}
{{- $apiKeyStore := "" }}
{{- if $existing }}
  {{- if not (and $existing.data (hasKey $existing.data .Values.auth.adminKeyKey) (hasKey $existing.data .Values.auth.apiKeysKey)) }}
    {{- fail (printf "generated auth Secret %s is missing %s or %s" $secretName .Values.auth.adminKeyKey .Values.auth.apiKeysKey) }}
  {{- end }}
  {{- $adminKey = (index $existing.data .Values.auth.adminKeyKey | b64dec) }}
  {{- $apiKeyStore = (index $existing.data .Values.auth.apiKeysKey | b64dec) }}
  {{- if hasKey $existing.data .Values.auth.metricsKeyKey }}
    {{- $metricsKey = (index $existing.data .Values.auth.metricsKeyKey | b64dec) }}
  {{- else }}
    {{- $metricsKey = printf "zepto_%s" (randBytes 32 | sha256sum) }}
  {{- end }}
  {{- $adminHash := sha256sum $adminKey }}
  {{- if not (contains $adminHash $apiKeyStore) }}
    {{- fail (printf "generated auth Secret %s has an administrator key that does not match %s" $secretName .Values.auth.apiKeysKey) }}
  {{- end }}
  {{- $metricsHash := sha256sum $metricsKey }}
  {{- if not (contains $metricsHash $apiKeyStore) }}
    {{- $apiKeyStore = printf "%s\nak_metrics|helm-prometheus-metrics|%s|metrics||1|0|||0\n" $apiKeyStore $metricsHash }}
  {{- end }}
{{- else }}
  {{- $adminKey = printf "zepto_%s" (randBytes 32 | sha256sum) }}
  {{- $metricsKey = printf "zepto_%s" (randBytes 32 | sha256sum) }}
  {{- $adminHash := sha256sum $adminKey }}
  {{- $metricsHash := sha256sum $metricsKey }}
  {{- $apiKeyStore = printf "# zeptodb-keys-v1\nak_bootstrap|helm-bootstrap-admin|%s|admin||1|0|||0\nak_metrics|helm-prometheus-metrics|%s|metrics||1|0|||0\n" $adminHash $metricsHash }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zeptodb.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.adminKeyKey }}: {{ $adminKey | quote }}
  {{ .Values.auth.metricsKeyKey }}: {{ $metricsKey | quote }}
  {{ .Values.auth.apiKeysKey }}: |
    {{- $apiKeyStore | nindent 4 }}
---
{{- end }}
{{- if and .Values.cluster.security.enabled (not .Values.cluster.security.existingSecret) }}
{{- $secretName := include "zeptodb.clusterSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $clusterSecret := "" }}
{{- if $existing }}
  {{- if not (and $existing.data (hasKey $existing.data .Values.cluster.security.secretKey)) }}
    {{- fail (printf "generated cluster Secret %s is missing %s" $secretName .Values.cluster.security.secretKey) }}
  {{- end }}
  {{- $clusterSecret = (index $existing.data .Values.cluster.security.secretKey | b64dec) }}
{{- else }}
  {{- $clusterSecret = randBytes 48 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zeptodb.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.cluster.security.secretKey }}: {{ $clusterSecret | quote }}
{{- end }}
