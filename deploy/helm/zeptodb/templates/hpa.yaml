{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "zeptodb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zeptodb.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: {{ if .Values.cluster.enabled }}StatefulSet{{ else }}Deployment{{ end }}
    name: {{ include "zeptodb.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.autoscaling.scaleDown.stabilizationSeconds }}
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.autoscaling.scaleUp.stabilizationSeconds }}
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPU }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemory }}
    {{- if .Values.autoscaling.ingestRateEnabled }}
    # Custom Pods metric (P8-I4, devlog 117) — autoscale on real ingest
    # load. Requires prometheus-adapter mapping `zepto_ingest_ticks_per_sec`
    # → `pods/zepto_ingest_ticks_per_sec`. CPU/memory above remain as the
    # safety net for non-ingest workloads.
    - type: Pods
      pods:
        metric:
          name: zepto_ingest_ticks_per_sec
        target:
          type: AverageValue
          averageValue: "{{ .Values.autoscaling.targetIngestRate }}"
    {{- end }}
{{- end }}
