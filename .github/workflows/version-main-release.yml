name: Version Main Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: version-main-release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version:
    if: >-
      ${{
        github.ref == 'refs/heads/main' &&
        (
          github.event_name == 'workflow_dispatch' ||
          !startsWith(github.event.head_commit.message, 'chore(release):')
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Skip if HEAD is already tagged
        id: head_tag
        run: |
          tag="$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)"
          if [ -n "$tag" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate next version
        if: steps.head_tag.outputs.skip != 'true'
        id: version
        run: echo "version=$(python3 .github/scripts/release_version.py next)" >> "$GITHUB_OUTPUT"

      - name: Update version files
        if: steps.head_tag.outputs.skip != 'true'
        run: python3 .github/scripts/release_version.py bump "${{ steps.version.outputs.version }}"

      - name: Commit version bump
        if: steps.head_tag.outputs.skip != 'true'
        run: |
          git add CMakeLists.txt zepto_py/__init__.py web/package.json
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"

      - name: Create release tag
        if: steps.head_tag.outputs.skip != 'true'
        run: git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"

      - name: Push release commit and tag
        if: steps.head_tag.outputs.skip != 'true'
        run: |
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Dispatch release workflow
        if: steps.head_tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref "v${{ steps.version.outputs.version }}"
