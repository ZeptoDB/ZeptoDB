# DEPRECATED: Replaced by Astro Starlight site (ZeptoDB-site repo)
# Kept for reference. The trigger-site-build.yml workflow now dispatches
# to ZeptoDB-site on docs/** changes.
name: Deploy Docs (disabled)

on:
  workflow_dispatch:  # manual only, no longer auto-triggers

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: false  # disabled
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs-material mkdocs-static-i18n "mkdocs-material[imaging]"
      - run: mkdocs gh-deploy --force
