name: PR Docs Check

on:
  pull_request:
    branches: [dev, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docs-check:
    runs-on: ubuntu-latest
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-docs-check')"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.2
        with:
          fetch-depth: 0
      - name: Check documentation updated
        run: |
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" | bash .github/scripts/check_docs_updated.sh
      - name: Check English-first policy
        run: bash .github/scripts/check_english_first.sh
