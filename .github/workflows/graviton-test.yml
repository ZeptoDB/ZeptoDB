name: Graviton ARM64 Build & Test

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', 'web/**', '*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', 'web/**', '*.md']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: [self-hosted, linux, ARM64]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install optional connector libs (Kafka, MQTT)
        run: |
          if command -v apt-get >/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y librdkafka-dev libpaho-mqttpp-dev libpaho-mqtt-dev
          elif command -v dnf >/dev/null; then
            sudo dnf install -y librdkafka-devel paho-c-devel paho-cpp-devel || \
              sudo dnf install -y librdkafka-devel
          fi

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=clang-19 \
                -DCMAKE_CXX_COMPILER=clang++-19 \
                -DZEPTO_USE_KAFKA=ON \
                -DZEPTO_USE_MQTT=ON \
                -G Ninja -S .. -B .
          ninja -j$(nproc) zepto_tests

      - name: Test
        run: ./build/tests/zepto_tests --gtest_output=xml:build/test-results.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: graviton-test-results
          path: build/test-results.xml
